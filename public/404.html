<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Choice Clinic</title>
    <script>
      // SPA redirect trick for GitHub Pages — rewrites /foo/bar into
      // /?/foo/bar so index.html can read it and restore the URL.
      // Based on https://github.com/rafgraph/spa-github-pages
      (function () {
        var segmentCount = 1; // repo name = 1 path segment (/ChoiceClinic/)
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segmentCount)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(segmentCount)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
