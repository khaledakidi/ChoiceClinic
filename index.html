    <script>
      // SPA decoder for GitHub Pages: the 404.html above rewrites
      // /ChoiceClinic/foo into /ChoiceClinic/?/foo. Here we read it
      // back and replaceState so react-router sees the real URL.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
